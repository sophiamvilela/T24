<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGuard - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-escuro: #0d1b2a;
            --azul-medio: #1565c0;
            --azul-claro: #29b6f6;
            --amarelo: #ffc107;
            --branco: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .lado-esquerdo {
            flex: 1.1; background: var(--branco);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; position: relative; animation: fadeInLeft 0.8s ease forwards;
        }
        .lado-esquerdo::after {
            content: ''; position: absolute; right: 0; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--azul-claro), var(--azul-medio));
        }
        .logo-img { width: 600px; max-width: 90%; margin-top: -120px; animation: fadeInUp 0.9s ease 0.2s both; }
        .tagline {
            margin-top: -150px; font-family: 'Rajdhani', sans-serif;
            font-size: 18px; letter-spacing: 3px; color: #888;
            text-transform: uppercase; animation: fadeInUp 0.9s ease 0.4s both;
        }
        .lado-direito {
            flex: 0.9;
            background: linear-gradient(160deg, #1e88e5 0%, #1565c0 60%, #0d47a1 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 50px; position: relative; overflow: hidden;
            animation: fadeInRight 0.8s ease forwards;
        }
        .lado-direito::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            border-radius: 50%; border: 60px solid rgba(255,255,255,0.05);
            top: -100px; right: -100px;
        }
        .lado-direito::after {
            content: ''; position: absolute; width: 300px; height: 300px;
            border-radius: 50%; border: 40px solid rgba(255,255,255,0.05);
            bottom: -80px; left: -60px;
        }
        .titulo-login {
            font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700;
            color: var(--branco); margin-bottom: 10px; letter-spacing: 1px;
            animation: fadeInDown 0.8s ease 0.3s both;
        }
        .titulo-login span { color: var(--amarelo); }
        .subtitulo-login {
            font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 40px;
            letter-spacing: 1px; animation: fadeInDown 0.8s ease 0.4s both;
        }
        .form-container {
            width: 100%; max-width: 340px; display: flex; flex-direction: column;
            gap: 16px; position: relative; z-index: 1;
        }
        .input-wrapper { position: relative; animation: fadeInUp 0.8s ease both; }
        .input-wrapper:nth-child(1) { animation-delay: 0.5s; }
        .input-wrapper:nth-child(2) { animation-delay: 0.6s; }
        .input-wrapper input {
            width: 100%; padding: 16px 20px; border: none; border-radius: 50px;
            background: rgba(255,255,255,0.15); color: var(--branco);
            font-family: 'Nunito', sans-serif; font-size: 14px; outline: none;
            transition: background 0.3s, box-shadow 0.3s; backdrop-filter: blur(4px);
        }
        .input-wrapper input::placeholder { color: rgba(255,255,255,0.7); }
        .input-wrapper input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }
        .btn-entrar {
            margin-top: 8px; padding: 16px; border: none; border-radius: 50px;
            background: var(--amarelo); color: var(--azul-escuro);
            font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            animation: fadeInUp 0.8s ease 0.7s both;
        }
        .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); background: #ffca28; }
        .btn-entrar:active { transform: translateY(0); }
        .rodape-login {
            margin-top: 30px; font-size: 11px; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; animation: fadeInUp 0.8s ease 0.9s both;
        }
        @keyframes fadeInLeft { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
