<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGuard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@300;400;600&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }

        /* ══════════════════════════════════════════
           LOGIN
        ══════════════════════════════════════════ */
        :root {
            --azul-escuro: #0d1b2a;
            --azul-medio: #1565c0;
            --azul-claro: #29b6f6;
            --amarelo: #ffc107;
            --branco: #ffffff;
        }

        #tela-login {
            position: fixed; inset: 0; z-index: 9999;
            display: flex;
            transition: opacity 0.6s, visibility 0.6s;
        }
        #tela-login.saindo {
            opacity: 0; pointer-events: none;
        }

        .lado-esquerdo {
            flex: 1.1; background: var(--branco);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; gap: 0; position: relative;
            animation: fadeInLeft 0.8s ease forwards;
        }
        .lado-esquerdo::after {
            content: ''; position: absolute; right: 0; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--azul-claro), var(--azul-medio));
        }
        .logo-icone {
            width: 420px; max-width: 88%;
            animation: fadeInUp 0.9s ease 0.2s both;
        }

        .lado-direito {
            flex: 0.9; font-family: 'Nunito', sans-serif;
            background: linear-gradient(160deg, #1e88e5 0%, #1565c0 60%, #0d47a1 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 50px; position: relative; overflow: hidden;
            animation: fadeInRight 0.8s ease forwards;
        }
        .lado-direito::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            border-radius: 50%; border: 60px solid rgba(255,255,255,0.05);
            top: -100px; right: -100px;
        }
        .lado-direito::after {
            content: ''; position: absolute; width: 300px; height: 300px;
            border-radius: 50%; border: 40px solid rgba(255,255,255,0.05);
            bottom: -80px; left: -60px;
        }
        .titulo-login {
            font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700;
            color: var(--branco); margin-bottom: 10px; letter-spacing: 1px;
            animation: fadeInDown 0.8s ease 0.3s both;
        }
        .titulo-login span { color: var(--amarelo); }
        .subtitulo-login {
            font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 40px;
            letter-spacing: 1px; animation: fadeInDown 0.8s ease 0.4s both;
        }
        .form-container {
            width: 100%; max-width: 340px; display: flex; flex-direction: column;
            gap: 16px; position: relative; z-index: 1;
        }
        .input-wrapper { position: relative; animation: fadeInUp 0.8s ease both; }
        .input-wrapper:nth-child(1) { animation-delay: 0.5s; }
        .input-wrapper:nth-child(2) { animation-delay: 0.6s; }
        .input-wrapper input {
            width: 100%; padding: 16px 20px; border: none; border-radius: 50px;
            background: rgba(255,255,255,0.15); color: var(--branco);
            font-family: 'Nunito', sans-serif; font-size: 14px; outline: none;
            transition: background 0.3s, box-shadow 0.3s; backdrop-filter: blur(4px);
        }
        .input-wrapper input::placeholder { color: rgba(255,255,255,0.7); }
        .input-wrapper input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        #erro-login {
            color: #ffcdd2; font-size: 13px; text-align: center;
            min-height: 18px; animation: fadeInUp 0.3s ease;
        }

        .btn-entrar {
            padding: 16px; border: none; border-radius: 50px;
            background: var(--amarelo); color: var(--azul-escuro);
            font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            animation: fadeInUp 0.8s ease 0.7s both;
        }
        .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); background: #ffca28; }
        .btn-entrar:active { transform: translateY(0); }
        .rodape-login {
            margin-top: 30px; font-size: 11px; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; animation: fadeInUp 0.8s ease 0.9s both;
        }

        @keyframes fadeInLeft  { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInRight { from { opacity:0; transform:translateX(30px);  } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInUp    { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeInDown  { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

        /* ══════════════════════════════════════════
           MAPA
        ══════════════════════════════════════════ */
        #tela-mapa {
            position: fixed; inset: 0; z-index: 1;
            opacity: 0; pointer-events: none;
            transition: opacity 0.6s 0.3s;
            font-family: 'DM Sans', sans-serif; background: #0d0d0f;
        }
        #tela-mapa.visivel {
            opacity: 1; pointer-events: all;
        }

        #mapa { height: 100%; width: 100%; }

        /* Topbar com logout */
        #topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            height: 60px; padding: 0 20px;
            background: rgba(13,13,18,0.9);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #topbar .brand {
            font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700;
            color: #fff; letter-spacing: 1px;
        }
        #topbar .brand span { color: #63b3ed; }
        #topbar .usuario {
            display: flex; align-items: center; gap: 12px;
        }
        #topbar .nome-usuario {
            font-size: 13px; color: #aaa; font-family: 'DM Sans', sans-serif;
        }
        .btn-logout {
            padding: 7px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            background: transparent; color: #888; font-family: 'Syne', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.08); color: #ccc; }

        #painel {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 8px;
            filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
        }
        #painel input {
            width: 280px; padding: 12px 18px; border: none; border-radius: 12px 0 0 12px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            background: rgba(18,18,24,0.95); color: #f0f0f5; outline: none;
        }
        #painel input::placeholder { color: #444; }
        #painel button {
            padding: 12px 20px; border: none; border-radius: 0 12px 12px 0;
            background: #63b3ed; color: #0d0d0f; font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
            cursor: pointer; transition: background 0.2s;
        }
        #painel button:hover { background: #90cdf4; }

        /* Slider K */
        #k-wrap {
            display: flex; align-items: center; gap: 8px;
            background: rgba(18,18,24,0.95); padding: 10px 14px; border-radius: 12px;
        }
        #k-wrap label {
            font-size: 11px; color: #68d391; font-family: 'Syne', sans-serif;
            font-weight: 800; letter-spacing: 0.08em; white-space: nowrap;
        }
        #k-slider { width: 90px; accent-color: #68d391; cursor: pointer; }
        #k-val { font-size: 13px; color: #eee; font-weight: 700; min-width: 18px; text-align: center; }

        #status {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(13,13,18,0.92); color: #888;
            font-size: 12px; padding: 8px 16px; border-radius: 20px;
            transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
        }
        #status.oculto { opacity: 0; }

        #legenda {
            position: absolute; top: 80px; right: 20px; z-index: 1000;
            background: rgba(13,13,18,0.92); border-radius: 14px; padding: 14px 18px;
            backdrop-filter: blur(12px); max-width: 220px;
            max-height: calc(100vh - 120px); overflow-y: auto; display: none;
        }
        #legenda h3 {
            font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
            letter-spacing: 0.12em; color: #68d391; text-transform: uppercase; margin-bottom: 12px;
        }
        .legenda-item { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
        .legenda-cor { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .legenda-nome { font-size: 12px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .legenda-count { font-size: 10px; color: #555; margin-left: auto; flex-shrink: 0; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 2000; display: none; flex-direction: column; align-items: center; gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 2.5px solid rgba(99,179,237,0.12); border-top-color: #63b3ed;
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #63b3ed; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; }

        .leaflet-control-zoom a { background: rgba(13,13,18,0.92) !important; color: #666 !important; border: none !important; }
        .leaflet-control-zoom a:hover { background: rgba(99,179,237,0.15) !important; color: #63b3ed !important; }
        .leaflet-control-attribution { display: none; }
        .leaflet-control-zoom { border: none !important; }
        #legenda::-webkit-scrollbar { width: 3px; }
        #legenda::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA     <div class="lado-direito">
        <div class="titulo-login">Lumi<span>Guard</span></div>
        <p class="subtitulo-login">ACESSO RESTRITO</p>
        <div class="form-container">
            <div class="input-wrapper">
                <input type="email" id="campo-email" placeholder="E-mail da prefeitura" />
            </div>
            <div class="input-wrapper">
                <input type="password" id="campo-senha" placeholder="Senha" />
            </div>
            <p id="erro-login"></p>
            <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
        </div>
        <p class="rodape-login">© 2025 LumiGuard · Todos os direitos reservados</p>
    </div>
</div>

<!-- ══ TELA DO MAPA ═══════════════════════════════════════════════════════ -->
<div id="tela-mapa">
    <!-- Topbar -->
    <div id="topbar">
        <div class="brand">Lumi<span>Guard</span></div>
        <div class="usuario">
            <span class="nome-usuario" id="nome-usuario"></span>
            <button class="btn-logout" onclick="fazerLogout()">SAIR</button>
        </div>
    </div>

    <div id="mapa"></div>

    <div id="painel">
        <input type="text" id="inputCidade" placeholder="Ex: São Paulo, SP" value="Santa Rita do Sapucai" />
        <button onclick="buscar()">BUSCAR</button>

        <div id="k-wrap">
            <label>K =</label>
            <input type="range" id="k-slider" min="2" max="30" value="15"
                   oninput="document.getElementById('k-val').textContent = this.value"
                   onchange="buscar()">
            <span id="k-val">15</span>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-msg">BUSCANDO...</p>
    </div>

    <div id="legenda">
        <h3 id="legenda-titulo">Clusters</h3>
        <div id="legenda-lista"></div>
    </div>

    <div id="status" class="oculto"></div>
</div>

<script>
/* ══════════════════════════════════════════
   CREDENCIAIS (substituir por autenticação real)
══════════════════════════════════════════ */
const USUARIOS = {
    'admin@lumiguard.com': { senha: '1234', nome: 'Administrador' },
    'prefeitura@srs.gov.br': { senha: 'lumiguard', nome: 'Prefeitura de SRS' },
};

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
function fazerLogin() {
    const email = document.getElementById('campo-email').value.trim();
    const senha = document.getElementById('campo-senha').value;
    const erro  = document.getElementById('erro-login');

    const usuario = USUARIOS[email];
    if (!usuario || usuario.senha !== senha) {
        erro.textContent = 'E-mail ou senha incorretos.';
        return;
    }
    erro.textContent = '';
    document.getElementById('nome-usuario').textContent = usuario.nome;

    // Animar saída do login e entrada do mapa
    const login = document.getElementById('tela-login');
    const mapa  = document.getElementById('tela-mapa');
    login.classList.add('saindo');
    setTimeout(() => {
        login.style.display = 'none';
        mapa.classList.add('visivel');
        iniciarMapa();
    }, 600);
}

function fazerLogout() {
    const login = document.getElementById('tela-login');
    const mapa  = document.getElementById('tela-mapa');
    mapa.classList.remove('visivel');
    login.style.display = 'flex';
    login.classList.remove('saindo');
    document.getElementById('campo-email').value = '';
    document.getElementById('campo-senha').value = '';
}

// Enter no campo de senha
document.getElementById('campo-senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
});

/* ══════════════════════════════════════════
   MAPA
══════════════════════════════════════════ */
const API_BASE = 'http://localhost:8000';

const PALETA = [
    '#63b3ed','#68d391','#f6ad55','#fc8181','#b794f4',
    '#76e4f7','#f6e05e','#fbb6ce','#9ae6b4','#90cdf4',
    '#fbd38d','#feb2b2','#d6bcfa','#81e6d9','#faf089',
    '#e9d8fd','#bee3f8','#c6f6d5','#fed7d7','#feebc8',
    '#44a3d8','#48bb78','#dd6b20','#e53e3e','#805ad5',
    '#00b5d8','#d69e2e','#d53f8c','#2f855a','#2b6cb0',
];

let mapa          = null;
let camada        = null;
let camadaPostes  = null;
let clusterAtivo  = null;
let kAtual        = 15;
let mapaIniciado  = false;

function iniciarMapa() {
    if (mapaIniciado) { buscar(); return; }
    mapaIniciado = true;
    mapa = L.map('mapa').setView([-22.2519, -45.7045], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapa);

    // Tooltip style
    const s = document.createElement('style');
    s.textContent = `
        .tooltip-bairro {
            background: rgba(10,10,14,0.94) !important; border: none !important;
            border-radius: 8px !important; color: #f0f0f5 !important;
            font-family: 'DM Sans', sans-serif !important; font-size: 13px !important;
            padding: 6px 12px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.6) !important;
        }
        .leaflet-tooltip-top.tooltip-bairro:before { display: none !important; }
    `;
    document.head.appendChild(s);

    document.getElementById('inputCidade').addEventListener('keydown', e => {
        if (e.key === 'Enter') buscar();
    });

    buscar();
}

function cor(i) { return PALETA[i % PALETA.length]; }

function mostrarStatus(msg, duracao = 3000) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.classList.remove('oculto');
    if (duracao > 0) setTimeout(() => el.classList.add('oculto'), duracao);
}
function mostrarLoading(show, msg = 'BUSCANDO...') {
    document.getElementById('loading-msg').textContent = msg;
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

function renderizarClusters(geojson) {
    if (camada) mapa.removeLayer(camada);

    camada = L.geoJSON(geojson, {
        style: feature => {
            const c = cor(feature.properties.colorIdx);
            return { fillColor: c, fillOpacity: 0.32, color: c, weight: 1.5, opacity: 0.8 };
        },
        onEachFeature: (feature, layer) => {
            const p = feature.properties;
            layer.bindTooltip(
                `<b>Cluster ${p.cluster_id + 1}</b><br>${p.total_postes} postes`,
                { sticky: true, className: 'tooltip-bairro', direction: 'top' }
            );
            layer.on('mouseover', function () { this.setStyle({ fillOpacity: 0.6, weight: 2.5 }); });
            layer.on('mouseout',  function () { camada.resetStyle(this); });
            layer.on('click', function () {
                mapa.fitBounds(this.getBounds(), { padding: [50, 50] });
                const cid = feature.properties.cluster_id;
                if (clusterAtivo === cid) return;
                clusterAtivo = cid;
                carregarPostes(cid);
            });
        }
    }).addTo(mapa);

    // Centroides
    geojson.features.forEach(f => {
        const p = f.properties;
        L.circleMarker([p.centroide_lat, p.centroide_lon], {
            radius: 4, color: cor(p.colorIdx), fillColor: cor(p.colorIdx),
            fillOpacity: 1, weight: 2,
        }).addTo(camada)
          .bindTooltip(
            `<b>Cluster ${p.cluster_id + 1}</b><br>${p.total_postes} postes`,
            { className: 'tooltip-bairro', direction: 'top' }
          );
    });

    if (camada.getBounds().isValid())
        mapa.fitBounds(camada.getBounds(), { padding: [60, 60] });

    // Legenda
    const k = document.getElementById('k-slider').value;
    document.getElementById('legenda-titulo').textContent = `Clusters (K=${k})`;
    const lista = document.getElementById('legenda-lista');
    lista.innerHTML = '';
    geojson.features
        .slice()
        .sort((a, b) => a.properties.cluster_id - b.properties.cluster_id)
        .forEach(f => {
            const p = f.properties;
            const item = document.createElement('div');
            item.className = 'legenda-item';
            item.innerHTML = `
                <div class="legenda-cor" style="background:${cor(p.colorIdx)}"></div>
                <span class="legenda-nome">Cluster ${p.cluster_id + 1}</span>
                <span class="legenda-count">${p.total_postes}</span>
            `;
            lista.appendChild(item);
        });
    document.getElementById('legenda').style.display = 'block';
}

async function carregarPostes(clusterId) {
    if (camadaPostes) { mapa.removeLayer(camadaPostes); camadaPostes = null; }
    try {
        const resp = await fetch(`${API_BASE}/api/postes/${clusterId}?k=${kAtual}`);
        if (!resp.ok) throw new Error('Erro ao buscar postes.');
        const geojson = await resp.json();

        camadaPostes = L.geoJSON(geojson, {
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                radius: 3.5, fillColor: '#f6e05e', color: '#0d0d0f',
                weight: 0.8, fillOpacity: 0.85,
            }),
            onEachFeature: (feature, layer) => {
                layer.bindTooltip(`<b>Poste</b><br>${feature.properties.bairro}`,
                    { sticky: true, className: 'tooltip-bairro', direction: 'top' });
            }
        }).addTo(mapa);

        mostrarStatus(`${geojson.features.length} postes no cluster ${clusterId + 1}`, 3000);
    } catch (err) { console.error(err); }
}

async function buscar() {
    const input = document.getElementById('inputCidade').value.trim();
    if (!input || !mapa) return;

    const k = document.getElementById('k-slider').value;
    kAtual = parseInt(k);

    mostrarLoading(true, 'GEOCODIFICANDO...');
    document.getElementById('legenda').style.display = 'none';
    if (camadaPostes) { mapa.removeLayer(camadaPostes); camadaPostes = null; }
    clusterAtivo = null;

    try {
        const geoResp = await fetch(`${API_BASE}/api/geocode?cidade=${encodeURIComponent(input)}`);
        if (!geoResp.ok) throw new Error('Cidade não encontrada.');
        const { lat, lon } = await geoResp.json();
        mapa.setView([lat, lon], 13);

        mostrarLoading(true, `K-MEANS  K = ${k}...`);
        const cResp = await fetch(`${API_BASE}/api/clusters?k=${k}`);
        if (!cResp.ok) throw new Error('Erro ao buscar clusters.');
        const geojson = await cResp.json();

        if (!geojson.features.length) {
            mostrarStatus('Nenhum cluster gerado.', 5000);
            return;
        }
        renderizarClusters(geojson);
        mostrarStatus(`${geojson.features.length} clusters carregados`, 4000);

    } catch (err) {
        mostrarStatus(`Erro: ${err.message}`, 5000);
        console.error(err);
    } finally {
        mostrarLoading(false);
    }
}
</script>
</body>
</html>
