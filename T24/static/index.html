<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LumiGuard - Mapa de Bairros</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; font-family: 'DM Sans', sans-serif; background: #0d0d0f; }
        #mapa { height: 100%; width: 100%; }

        #painel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center;
            filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
        }
        #painel input {
            width: 280px; padding: 12px 18px; border: none; border-radius: 12px 0 0 12px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            background: rgba(18,18,24,0.95); color: #f0f0f5; outline: none;
        }
        #painel input::placeholder { color: #444; }
        #painel button {
            padding: 12px 20px; border: none; border-radius: 0 12px 12px 0;
            background: #63b3ed; color: #0d0d0f; font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
            cursor: pointer; transition: background 0.2s;
        }
        #painel button:hover { background: #90cdf4; }

        #status {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(13,13,18,0.92); color: #888;
            font-size: 12px; padding: 8px 16px; border-radius: 20px;
            transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
        }
        #status.oculto { opacity: 0; }

        #legenda {
            position: absolute; top: 80px; right: 20px; z-index: 1000;
            background: rgba(13,13,18,0.92); border-radius: 14px; padding: 14px 18px;
            backdrop-filter: blur(12px); max-width: 210px;
            max-height: calc(100vh - 120px); overflow-y: auto; display: none;
        }
        #legenda h3 {
            font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
            letter-spacing: 0.12em; color: #63b3ed; text-transform: uppercase; margin-bottom: 12px;
        }
        .legenda-item { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
        .legenda-cor { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .legenda-nome { font-size: 12px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 2000; display: none; flex-direction: column; align-items: center; gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 2.5px solid rgba(99,179,237,0.12); border-top-color: #63b3ed;
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #63b3ed; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; }

        .leaflet-control-zoom a { background: rgba(13,13,18,0.92) !important; color: #666 !important; border: none !important; }
        .leaflet-control-zoom a:hover { background: rgba(99,179,237,0.15) !important; color: #63b3ed !important; }
        .leaflet-control-attribution { display: none; }
        .leaflet-control-zoom { border: none !important; }
        #legenda::-webkit-scrollbar { width: 3px; }
        #legenda::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    </style>
</head>
<body>
<div id="mapa"></div>

<div id="painel">
    <input type="text" id="inputCidade" placeholder="Ex: Campinas, SP" value="Santa Rita do Sapucai" />
    <button onclick="buscarBairros()">BUSCAR</button>
</div>

<div id="loading">
    <div class="spinner"></div>
    <p>BUSCANDO BAIRROS...</p>
</div>

<div id="legenda">
    <h3>Bairros</h3>
    <div id="legenda-lista"></div>
</div>

<div id="status" class="oculto"></div>

<script>
    const PALETA = [
        '#63b3ed','#68d391','#f6ad55','#fc8181','#b794f4',
        '#76e4f7','#f6e05e','#fbb6ce','#9ae6b4','#90cdf4',
        '#fbd38d','#feb2b2','#d6bcfa','#81e6d9','#faf089',
        '#e9d8fd','#bee3f8','#c6f6d5','#fed7d7','#feebc8',
        '#44a3d8','#48bb78','#dd6b20','#e53e3e','#805ad5',
        '#00b5d8','#d69e2e','#d53f8c','#2f855a','#2b6cb0',
    ];

    var mapa = L.map('mapa').setView([-22.2519, -45.7045], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapa);

    var camadaBairros = null;
    var bairrosData = [];

    function mostrarStatus(msg, duracao = 3000) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.classList.remove('oculto');
        if (duracao > 0) setTimeout(() => el.classList.add('oculto'), duracao);
    }
    function mostrarLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }
    function cor(index) { return PALETA[index % PALETA.length]; }

    // ── Geocodificar cidade via Nominatim ─────────────────────────────────────
    async function geocodificarCidade(nome) {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(nome)}&format=json&limit=1`;
        const resp = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        const data = await resp.json();
        if (!data.length) throw new Error('Cidade não encontrada.');
        return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
    }

    // ── Buscar bairros via Overpass ───────────────────────────────────────────
    // Raio de 5km a partir do centro para pegar só bairros urbanos da cidade
    async function buscarOverpass(lat, lon) {
        const query = `
[out:json][timeout:30];
(
  relation["place"~"neighbourhood|suburb|quarter"](around:5000,${lat},${lon});
  way["place"~"neighbourhood|suburb|quarter"](around:5000,${lat},${lon});
);
out geom;`;
        const resp = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST',
            body: 'data=' + encodeURIComponent(query),
        });
        if (!resp.ok) throw new Error('Erro na Overpass API.');
        return await resp.json();
    }

    // ── Unir anéis contíguos ──────────────────────────────────────────────────
    function eqPt(a, b) { return Math.abs(a[0]-b[0]) < 1e-7 && Math.abs(a[1]-b[1]) < 1e-7; }

    function unirAneis(rings) {
        if (rings.length === 1) return rings;
        let remaining = rings.map(r => [...r]);
        const merged = [];
        while (remaining.length > 0) {
            let cur = remaining.shift();
            let changed = true;
            while (changed) {
                changed = false;
                for (let i = 0; i < remaining.length; i++) {
                    const r = remaining[i];
                    if (eqPt(cur[cur.length-1], r[0]))             { cur = cur.concat(r.slice(1)); }
                    else if (eqPt(cur[cur.length-1], r[r.length-1])){ cur = cur.concat([...r].reverse().slice(1)); }
                    else if (eqPt(cur[0], r[r.length-1]))           { cur = r.concat(cur.slice(1)); }
                    else if (eqPt(cur[0], r[0]))                    { cur = [...r].reverse().concat(cur.slice(1)); }
                    else continue;
                    remaining.splice(i, 1); changed = true; break;
                }
            }
            if (!eqPt(cur[0], cur[cur.length-1])) cur.push(cur[0]);
            merged.push(cur);
        }
        return merged;
    }

    // ── Converter Overpass → GeoJSON ──────────────────────────────────────────
    function overpassParaGeoJSON(data) {
        const features = [];

        data.elements.forEach(el => {
            const nome = el.tags?.name || el.tags?.['name:pt'];
            if (!nome) return;

            // Way simples
            if (el.type === 'way' && el.geometry?.length >= 3) {
                const ring = el.geometry.map(p => [p.lon, p.lat]);
                if (!eqPt(ring[0], ring[ring.length-1])) ring.push(ring[0]);
                if (ring.length < 4) return;
                features.push({
                    type: 'Feature',
                    properties: { name: nome, colorIdx: features.length },
                    geometry: { type: 'Polygon', coordinates: [ring] }
                });
                return;
            }

            // Relação
            if (el.type === 'relation' && el.members?.length) {
                const outerRings = [];
                el.members.forEach(m => {
                    if (m.type !== 'way' || (m.role !== 'outer' && m.role !== '')) return;
                    if (!m.geometry?.length) return;
                    const ring = m.geometry.map(p => [p.lon, p.lat]);
                    if (!eqPt(ring[0], ring[ring.length-1])) ring.push(ring[0]);
                    if (ring.length >= 4) outerRings.push(ring);
                });
                if (!outerRings.length) return;
                const merged = unirAneis(outerRings);
                features.push({
                    type: 'Feature',
                    properties: { name: nome, colorIdx: features.length },
                    geometry: merged.length === 1
                        ? { type: 'Polygon', coordinates: merged }
                        : { type: 'MultiPolygon', coordinates: merged.map(r => [r]) }
                });
            }
        });

        return { type: 'FeatureCollection', features };
    }

    // ── Renderizar ────────────────────────────────────────────────────────────
    function renderizarBairros(geojson) {
        if (camadaBairros) mapa.removeLayer(camadaBairros);

        bairrosData = geojson.features.map(f => ({
            nome: f.properties.name,
            cor: cor(f.properties.colorIdx),
        }));

        camadaBairros = L.geoJSON(geojson, {
            style: feature => {
                const c = cor(feature.properties.colorIdx);
                return { fillColor: c, fillOpacity: 0.32, color: c, weight: 1.5, opacity: 0.8 };
            },
            onEachFeature: (feature, layer) => {
                layer.bindTooltip(`<b>${feature.properties.name}</b>`, {
                    sticky: true, className: 'tooltip-bairro', direction: 'top',
                });
                layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.6, weight: 2.5 }); });
                layer.on('mouseout',  function() { camadaBairros.resetStyle(this); });
                layer.on('click',     function() { mapa.fitBounds(this.getBounds(), { padding: [50,50] }); });
            }
        }).addTo(mapa);

        if (camadaBairros.getBounds().isValid()) {
            mapa.fitBounds(camadaBairros.getBounds(), { padding: [60,60] });
        }
        atualizarLegenda();
    }

    function atualizarLegenda() {
        const lista = document.getElementById('legenda-lista');
        const legenda = document.getElementById('legenda');
        lista.innerHTML = '';
        if (!bairrosData.length) { legenda.style.display = 'none'; return; }
        [...bairrosData]
            .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'))
            .forEach(b => {
                const item = document.createElement('div');
                item.className = 'legenda-item';
                item.innerHTML = `<div class="legenda-cor" style="background:${b.cor}"></div>
                                  <span class="legenda-nome" title="${b.nome}">${b.nome}</span>`;
                lista.appendChild(item);
            });
        legenda.style.display = 'block';
    }

    // ── Busca principal ───────────────────────────────────────────────────────
    async function buscarBairros() {
        const input = document.getElementById('inputCidade').value.trim();
        if (!input) return;

        mostrarLoading(true);
        mostrarStatus('Geocodificando cidade...', 0);
        document.getElementById('legenda').style.display = 'none';

        try {
            const { lat, lon } = await geocodificarCidade(input);
            mapa.setView([lat, lon], 14);
            mostrarStatus('Buscando bairros...', 0);

            const overpassData = await buscarOverpass(lat, lon);
            const geojson = overpassParaGeoJSON(overpassData);

            console.log('[LumiGuard] features encontradas:', geojson.features.length);
            console.log('[LumiGuard] nomes:', geojson.features.map(f => f.properties.name));

            if (!geojson.features.length) {
                mostrarStatus('Nenhum bairro encontrado no OSM para esta cidade.', 5000);
                return;
            }

            renderizarBairros(geojson);
            mostrarStatus(`${geojson.features.length} bairro(s) carregado(s)`, 4000);

        } catch (err) {
            mostrarStatus(`Erro: ${err.message}`, 5000);
            console.error(err);
        } finally {
            mostrarLoading(false);
        }
    }

    document.getElementById('inputCidade').addEventListener('keydown', e => {
        if (e.key === 'Enter') buscarBairros();
    });

    const s = document.createElement('style');
    s.textContent = `
        .tooltip-bairro {
            background: rgba(10,10,14,0.94) !important; border: none !important;
            border-radius: 8px !important; color: #f0f0f5 !important;
            font-family: 'DM Sans', sans-serif !important; font-size: 13px !important;
            padding: 6px 12px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.6) !important;
        }
        .leaflet-tooltip-top.tooltip-bairro:before { display: none !important; }
    `;
    document.head.appendChild(s);

    window.addEventListener('load', () => buscarBairros());
</script>
</body>
</html>
