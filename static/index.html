<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGuard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@300;400;600&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }

        :root {
            --azul-escuro:   #0d47a1;
            --azul-medio:    #1565c0;
            --azul-vivo:     #1e88e5;
            --azul-claro:    #29b6f6;
            --azul-suave:    #e3f2fd;
            --amarelo:       #ffc107;
            --amarelo-hover: #ffca28;
            --branco:        #ffffff;
            --cinza-leve:    #f0f4f8;
            --cinza-borda:   #cfd8dc;
            --texto-escuro:  #1a237e;
            --texto-medio:   #37474f;
            --texto-fraco:   #78909c;
            --vermelho:      #e53935;
            --verde:         #43a047;
        }

        /* ── LOGIN ── */
        #tela-login {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; transition: opacity 0.6s, visibility 0.6s;
        }
        #tela-login.saindo { opacity: 0; pointer-events: none; }

        .lado-esquerdo {
    flex: 1.1; background: var(--branco);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px;
    padding-bottom: 120px; /* ← adicione isso, aumente o valor para subir mais */
    position: relative;
    animation: fadeInLeft 0.8s ease forwards;
}
        .lado-esquerdo::after {
            content: ''; position: absolute; right: 0; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--azul-claro), var(--azul-medio));
        }
        .logo-icone {
    width: 420px;
    max-width: 88%;
    animation: fadeInUp 0.9s ease 0.2s both;
    margin-bottom: -80px;
    position: relative;
    z-index: 0;
}

        .logo-subtitulo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #90a4ae;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 0;
    line-height: 1.8;
    position: relative;
    z-index: 1;
}

        .lado-direito {
            flex: 0.9; font-family: 'Nunito', sans-serif;
            background: linear-gradient(160deg, #1e88e5 0%, #1565c0 60%, #0d47a1 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 50px; position: relative; overflow: hidden;
            animation: fadeInRight 0.8s ease forwards;
        }
        .lado-direito::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            border-radius: 50%; border: 60px solid rgba(255,255,255,0.05);
            top: -100px; right: -100px;
        }
        .lado-direito::after {
            content: ''; position: absolute; width: 300px; height: 300px;
            border-radius: 50%; border: 40px solid rgba(255,255,255,0.05);
            bottom: -80px; left: -60px;
        }
        .titulo-login {
            font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700;
            color: var(--branco); margin-bottom: 10px; letter-spacing: 1px;
            animation: fadeInDown 0.8s ease 0.3s both;
        }
        .titulo-login span { color: var(--amarelo); }
        .subtitulo-login {
            font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 40px;
            letter-spacing: 1px; animation: fadeInDown 0.8s ease 0.4s both;
        }
        .form-container {
            width: 100%; max-width: 340px; display: flex; flex-direction: column;
            gap: 16px; position: relative; z-index: 1;
        }
        .input-wrapper { position: relative; animation: fadeInUp 0.8s ease both; }
        .input-wrapper:nth-child(1) { animation-delay: 0.5s; }
        .input-wrapper:nth-child(2) { animation-delay: 0.6s; }
        .input-wrapper input {
            width: 100%; padding: 16px 20px; border: none; border-radius: 50px;
            background: rgba(255,255,255,0.15); color: var(--branco);
            font-family: 'Nunito', sans-serif; font-size: 14px; outline: none;
            transition: background 0.3s, box-shadow 0.3s; backdrop-filter: blur(4px);
        }
        .input-wrapper input::placeholder { color: rgba(255,255,255,0.7); }
        .input-wrapper input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }
        #erro-login { color: #ffcdd2; font-size: 13px; text-align: center; min-height: 18px; }
        .btn-entrar {
            padding: 16px; border: none; border-radius: 50px;
            background: var(--amarelo); color: var(--azul-escuro);
            font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            animation: fadeInUp 0.8s ease 0.7s both;
        }
        .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); background: var(--amarelo-hover); }
        .btn-entrar:active { transform: translateY(0); }
        .rodape-login {
            margin-top: 30px; font-size: 11px; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; animation: fadeInUp 0.8s ease 0.9s both;
        }

        @keyframes fadeInLeft  { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInRight { from { opacity:0; transform:translateX(30px);  } to { opacity:1; transform:translateX(0); } }
        @keyframes fadeInUp    { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeInDown  { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

        /* ── TELA DO MAPA ── */
        #tela-mapa {
            position: fixed; inset: 0; z-index: 1;
            opacity: 0; pointer-events: none;
            transition: opacity 0.6s 0.3s;
            font-family: 'Rajdhani', sans-serif;
            background: var(--cinza-leve);
        }
        #tela-mapa.visivel { opacity: 1; pointer-events: all; }

        #mapa { height: 100%; width: 100%; }

        /* ── TOPBAR ── */
        #topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            height: 60px; padding: 0 20px;
            background: linear-gradient(90deg, #1565c0 0%, #1e88e5 100%);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(21,101,192,0.25);
        }
        #topbar .brand {
            font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700;
            color: #fff; letter-spacing: 1px;
        }
        #topbar .brand span { color: var(--amarelo); }
        #topbar .usuario { display: flex; align-items: center; gap: 12px; }
        #topbar .nome-usuario { font-size: 13px; color: rgba(255,255,255,0.8); }
        .btn-logout {
            padding: 7px 18px; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 8px;
            background: transparent; color: rgba(255,255,255,0.85);
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
            letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: #fff; }

        /* ── PAINEL DE BUSCA ── */
        #painel {
            position: absolute; top: 76px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 8px;
            filter: drop-shadow(0 4px 16px rgba(21,101,192,0.18));
        }
        #painel input {
            width: 260px; padding: 11px 18px; border: 1.5px solid var(--azul-claro);
            border-radius: 12px 0 0 12px;
            font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
            background: #fff; color: var(--texto-escuro); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #painel input:focus { border-color: var(--azul-medio); box-shadow: 0 0 0 3px rgba(30,136,229,0.15); }
        #painel input::placeholder { color: var(--texto-fraco); }
        #painel button {
            padding: 11px 20px; border: none; border-radius: 0 12px 12px 0;
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            color: #fff; font-family: 'Rajdhani', sans-serif;
            font-size: 13px; font-weight: 800; letter-spacing: 0.06em;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s;
        }
        #painel button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ── SLIDER GRUPOS ── */
        #k-wrap {
            display: flex; align-items: center; gap: 8px;
            background: #fff; padding: 10px 16px; border-radius: 12px;
            border: 1.5px solid var(--azul-claro);
            box-shadow: 0 2px 8px rgba(21,101,192,0.1);
        }
        #k-wrap label {
            font-size: 17px; color: var(--azul-medio); font-family: 'Rajdhani', sans-serif;
            font-weight: 800; letter-spacing: 0.04em; white-space: nowrap;
        }
        #k-slider { width: 90px; accent-color: var(--azul-medio); cursor: pointer; }
        #k-val { font-size: 13px; color: var(--texto-escuro); font-weight: 700; min-width: 18px; text-align: center; }

        /* ── STATUS ── */
        #status {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.95); color: var(--texto-medio);
            font-size: 12px; padding: 8px 16px; border-radius: 20px;
            box-shadow: 0 2px 12px rgba(21,101,192,0.15);
            transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
        }
        #status.oculto { opacity: 0; }

        /* ── WRAPPER BOTAO LUMINARIA VENCIDA ── */
        #btn-vencidas-wrapper {
            position: absolute; bottom: 212px; left: 20px; z-index: 1000;
            display: none;
        }
        #btn-vencidas {
            padding: 11px 18px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--azul-vivo), var(--azul-escuro));
            color: #fff; font-family: 'Rajdhani', sans-serif;
            font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
            cursor: pointer; white-space: nowrap;
            box-shadow: 0 3px 12px rgba(21,101,192,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        #btn-vencidas:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(21,101,192,0.4); }

        /* ── CARD RESUMO ── */
        #card-resumo {
            position: absolute; bottom: 32px; left: 20px; z-index: 1000;
            background: #fff;
            border-radius: 14px; padding: 14px 20px;
            box-shadow: 0 4px 20px rgba(21,101,192,0.18);
            border-left: 4px solid var(--azul-medio);
            min-width: 220px; display: none;
        }
        #card-resumo .resumo-titulo {
            font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
            letter-spacing: 0.1em; color: var(--azul-medio);
            text-transform: uppercase; margin-bottom: 10px;
        }
        .resumo-linha {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 0; font-family: 'Rajdhani', sans-serif; font-size: 15px;
        }
        .resumo-linha .rl-label { color: var(--texto-medio); }
        .resumo-linha .rl-val { font-weight: 700; color: var(--texto-escuro); }
        .resumo-linha .rl-val.problema { color: var(--vermelho); }
        .resumo-linha .rl-val.ok { color: var(--verde); }
        .resumo-linha .rl-val.vencida { color: #f57f17; }

        /* ── LEGENDA ── */
        #legenda {
            position: absolute; top: 76px; right: 20px; z-index: 1000;
            background: #fff; border-radius: 14px; padding: 14px 18px;
            box-shadow: 0 4px 20px rgba(21,101,192,0.15);
            max-width: 220px; max-height: calc(100vh - 120px);
            overflow-y: auto; display: none;
            border-top: 3px solid var(--azul-medio);
        }
        #legenda h3 {
            font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
            letter-spacing: 0.1em; color: var(--azul-medio);
            text-transform: uppercase; margin-bottom: 12px;
        }
        .legenda-item { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
        .legenda-cor { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .legenda-nome { font-size: 15px; font-family: 'Rajdhani', sans-serif; color: var(--texto-medio); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .legenda-count { font-size: 14px; font-family: 'Rajdhani', sans-serif; color: var(--texto-fraco); margin-left: auto; flex-shrink: 0; }
        #legenda::-webkit-scrollbar { width: 3px; }
        #legenda::-webkit-scrollbar-thumb { background: var(--azul-claro); border-radius: 2px; }

        /* ── LOADING ── */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 2000; display: none; flex-direction: column; align-items: center; gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 2.5px solid rgba(30,136,229,0.15); border-top-color: var(--azul-vivo);
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p {
            color: var(--azul-medio); font-family: 'Rajdhani', sans-serif;
            font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
            background: rgba(255,255,255,0.9); padding: 6px 14px; border-radius: 20px;
        }

        /* ── MODAL LUMINARIA VENCIDA ── */
        #modal-vencidas {
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(13,71,161,0.35); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
        }
        #modal-vencidas.aberto { display: flex; }
        .modal-box {
            background: #fff; border-radius: 18px;
            width: 90%; max-width: 560px; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(13,71,161,0.25);
            overflow: hidden;
        }
        .modal-header {
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            padding: 18px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 {
            font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700;
            color: #fff; letter-spacing: 0.5px;
        }
        .modal-header h2 span { color: var(--amarelo); }
        .btn-fechar-modal {
            background: rgba(255,255,255,0.2); border: none; border-radius: 8px;
            color: #fff; font-size: 18px; width: 32px; height: 32px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .btn-fechar-modal:hover { background: rgba(255,255,255,0.35); }
        .modal-body { overflow-y: auto; padding: 0; }
        .modal-body table { width: 100%; border-collapse: collapse; }
        .modal-body thead th {
            background: var(--azul-suave); color: var(--azul-escuro);
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 800;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 12px 20px; text-align: left;
            position: sticky; top: 0;
        }
        .modal-body tbody tr { border-bottom: 1px solid #e3f2fd; transition: background 0.15s; }
        .modal-body tbody tr:hover { background: #f5f9ff; }
        .modal-body tbody td {
            padding: 10px 20px; font-family: 'Rajdhani', sans-serif; font-size: 15px;
            color: var(--texto-medio);
        }
        .modal-body tbody td.bairro { font-weight: 600; color: var(--texto-escuro); }
        .modal-body tbody td.vencida { color: var(--vermelho); font-weight: 600; }
        .modal-vazia {
            text-align: center; padding: 40px; color: var(--texto-fraco);
            font-family: 'Rajdhani', sans-serif; font-size: 16px;
        }

        /* ── LEAFLET OVERRIDES ── */
        .leaflet-control-zoom {
            border: none !important;
            margin-left: 20px !important;
            margin-top: 70px !important;
        }
        .leaflet-top.leaflet-left { top: 0 !important; }
        .leaflet-control-zoom a {
            background: #fff !important; color: var(--azul-medio) !important;
            border: 1.5px solid var(--azul-claro) !important;
            box-shadow: 0 2px 8px rgba(21,101,192,0.12) !important;
            font-weight: 700 !important;
        }
        .leaflet-control-zoom a:hover {
            background: var(--azul-suave) !important; color: var(--azul-escuro) !important;
        }
        .leaflet-control-attribution { display: none; }

        .tooltip-poste {
            background: #fff !important; border: none !important;
            border-radius: 10px !important; color: var(--texto-escuro) !important;
            font-family: 'Rajdhani', sans-serif !important; font-size: 15px !important;
            padding: 8px 14px !important;
            box-shadow: 0 4px 20px rgba(21,101,192,0.18) !important;
            border-left: 3px solid var(--azul-medio) !important;
        }
        .leaflet-tooltip-top.tooltip-poste:before { display: none !important; }
        .tooltip-poste b { color: var(--azul-medio); }
        .tooltip-poste .sit-normal { color: var(--verde); font-weight: 600; }
        .tooltip-poste .sit-problema { color: var(--vermelho); font-weight: 600; }
    </style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="tela-login">
    <div class="lado-esquerdo">
        <img class="logo-icone" src="/static/logo.png" alt="LumiGuard" />
        <p class="logo-subtitulo">— MONITORAMENTO INTELIGENTE —<br>DE ILUMINAÇÃO PÚBLICA</p>
    </div>
    <div class="lado-direito">
        <div class="titulo-login">Lumi<span>Guard</span></div>
        <p class="subtitulo-login">ACESSO RESTRITO</p>
        <div class="form-container">
            <div class="input-wrapper">
                <input type="email" id="campo-email" placeholder="E-mail da prefeitura"/>
            </div>
            <div class="input-wrapper">
                <input type="password" id="campo-senha" placeholder="Senha"/>
            </div>
            <p id="erro-login"></p>
            <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
        </div>
        <p class="rodape-login">© 2025 LumiGuard · Todos os direitos reservados</p>
    </div>
</div>

<!-- TELA DO MAPA -->
<div id="tela-mapa">
    <div id="topbar">
        <div class="brand">Lumi<span>Guard</span></div>
        <div class="usuario">
            <span class="nome-usuario" id="nome-usuario"></span>
            <button class="btn-logout" onclick="fazerLogout()">SAIR</button>
        </div>
    </div>

    <div id="mapa"></div>

    <div id="painel">
        <input type="text" id="inputCidade" placeholder="Ex: São Paulo, SP" value="Santa Rita do Sapucai"/>
        <button onclick="buscar()">BUSCAR</button>
        <div id="k-wrap">
            <label>Grupos:</label>
            <input type="range" id="k-slider" min="2" max="30" value="15"
                   oninput="document.getElementById('k-val').textContent = this.value"
                   onchange="atualizarGrupos()">
            <span id="k-val">15</span>
        </div>
    </div>

    <div id="btn-vencidas-wrapper">
        <button id="btn-vencidas" onclick="abrirModalVencidas()">
            Ver postes com luminária vencida
        </button>
    </div>

    <div id="card-resumo">
        <div class="resumo-titulo">Situação da Iluminação</div>
        <div class="resumo-linha">
            <span class="rl-label">Total de postes</span>
            <span class="rl-val" id="res-total">—</span>
        </div>
        <div class="resumo-linha">
            <span class="rl-label">Funcionando</span>
            <span class="rl-val ok" id="res-ok">—</span>
        </div>
        <div class="resumo-linha">
            <span class="rl-label">Com problema</span>
            <span class="rl-val problema" id="res-problema">—</span>
        </div>
        <div class="resumo-linha">
            <span class="rl-label">Luminária vencida</span>
            <span class="rl-val vencida" id="res-vencidas">—</span>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-msg">BUSCANDO...</p>
    </div>

    <div id="legenda">
        <h3 id="legenda-titulo">Grupos</h3>
        <div id="legenda-lista"></div>
    </div>

    <div id="status" class="oculto"></div>
</div>

<!-- MODAL LUMINARIA VENCIDA -->
<div id="modal-vencidas">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Postes com luminária <span>vencida</span></h2>
            <button class="btn-fechar-modal" onclick="fecharModalVencidas()">✕</button>
        </div>
        <div class="modal-body" id="modal-body-content">
            <p class="modal-vazia">Carregando...</p>
        </div>
    </div>
</div>

<script>
const USUARIOS = {
    'admin@lumiguard.com':    { senha: '1234',       nome: 'Prefeitura' },
    'prefeitura@srs.gov.br':  { senha: 'lumiguard',  nome: 'Prefeitura de SRS' },
};

function fazerLogin() {
    const email = document.getElementById('campo-email').value.trim();
    const senha = document.getElementById('campo-senha').value;
    const erro  = document.getElementById('erro-login');
    const usuario = USUARIOS[email];
    if (!usuario || usuario.senha !== senha) {
        erro.textContent = 'E-mail ou senha incorretos.';
        return;
    }
    erro.textContent = '';
    document.getElementById('nome-usuario').textContent = usuario.nome;
    const login = document.getElementById('tela-login');
    const mapaEl = document.getElementById('tela-mapa');
    login.classList.add('saindo');
    setTimeout(() => {
        login.style.display = 'none';
        mapaEl.classList.add('visivel');
        iniciarMapa();
    }, 600);
}

function fazerLogout() {
    const login = document.getElementById('tela-login');
    const mapaEl = document.getElementById('tela-mapa');
    mapaEl.classList.remove('visivel');
    login.style.display = 'flex';
    login.classList.remove('saindo');
    document.getElementById('campo-email').value = '';
    document.getElementById('campo-senha').value = '';
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('campo-senha').addEventListener('keydown', e => {
        if (e.key === 'Enter') fazerLogin();
    });
});

const API_BASE = 'http://localhost:8000';

const PALETA = [
    '#1565c0','#1e88e5','#0288d1','#00838f','#2e7d32',
    '#558b2f','#f57f17','#e65100','#ad1457','#6a1b9a',
    '#4527a0','#283593','#37474f','#00695c','#4e342e',
    '#880e4f','#bf360c','#1b5e20','#0d47a1','#827717',
    '#33691e','#01579b','#006064','#004d40','#1a237e',
    '#e91e63','#9c27b0','#3f51b5','#009688','#ff5722',
];

let mapa         = null;
let camada       = null;
let camadaPostes = null;
let clusterAtivo = null;
let kAtual       = 15;
let mapaIniciado = false;
let limitesAtuais = null;

function iniciarMapa() {
    if (mapaIniciado) { buscar(); return; }
    mapaIniciado = true;

    mapa = L.map('mapa', { zoomControl: false }).setView([-22.2519, -45.7045], 13);
    L.control.zoom({ position: 'topleft' }).addTo(mapa);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapa);

    const s = document.createElement('style');
    s.textContent = `
        .tooltip-grupo {
            background: #fff !important; border: none !important;
            border-radius: 10px !important; color: #1a237e !important;
            font-family: 'Rajdhani', sans-serif !important; font-size: 15px !important;
            padding: 8px 14px !important;
            box-shadow: 0 4px 16px rgba(21,101,192,0.18) !important;
            border-left: 3px solid #1565c0 !important;
        }
        .leaflet-tooltip-top.tooltip-grupo:before { display: none !important; }
    `;
    document.head.appendChild(s);

    document.getElementById('inputCidade').addEventListener('keydown', e => {
        if (e.key === 'Enter') buscar();
    });

    buscar();
    carregarResumo();
    setInterval(carregarResumo, 5 * 60 * 1000);
}

function cor(i) { return PALETA[i % PALETA.length]; }

function mostrarStatus(msg, duracao = 3000) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.classList.remove('oculto');
    if (duracao > 0) setTimeout(() => el.classList.add('oculto'), duracao);
}

function mostrarLoading(show, msg = 'BUSCANDO...') {
    document.getElementById('loading-msg').textContent = msg;
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

function renderizarGrupos(geojson) {
    if (camada) mapa.removeLayer(camada);

    camada = L.geoJSON(geojson, {
        style: feature => {
            const c = cor(feature.properties.colorIdx);
            return { fillColor: c, fillOpacity: 0.22, color: c, weight: 2, opacity: 0.7 };
        },
        onEachFeature: (feature, layer) => {
            const p = feature.properties;
            const ttHtml = `
                <b>Grupo ${p.cluster_id + 1}</b><br>
                Normal: <span style="color:#43a047;font-weight:700">${p.normais ?? '—'}</span><br>
                Com defeito: <span style="color:#e53935;font-weight:700">${p.com_defeito ?? '—'}</span><br>
                Luminária vencida: <span style="color:#f57f17;font-weight:700">${p.vencidos ?? '—'}</span>
            `;
            layer.bindTooltip(ttHtml, { sticky: true, className: 'tooltip-grupo', direction: 'top' });
            layer.on('mouseover', function () { this.setStyle({ fillOpacity: 0.45, weight: 3 }); });
            layer.on('mouseout', function (e) {
                const dest = e.originalEvent ? e.originalEvent.relatedTarget : null;
                if (dest && dest.closest && dest.closest('.leaflet-overlay-pane')) return;
                camada.resetStyle(this);
            });
            layer.on('click', function () {
                const cid = feature.properties.cluster_id;
                mapa.fitBounds(this.getBounds(), { padding: [40, 40], animate: true });
                if (clusterAtivo === cid) return;
                clusterAtivo = cid;
                carregarPostes(cid);
            });
        }
    }).addTo(mapa);

    const styleNum = document.getElementById('style-num-grupo');
    if (!styleNum) {
        const s = document.createElement('style');
        s.id = 'style-num-grupo';
        s.textContent = `
            .marker-num-grupo {
                display: flex; align-items: center; justify-content: center;
                font-family: 'Rajdhani', sans-serif; font-weight: 700;
                font-size: 13px; color: #fff;
                width: 26px; height: 26px; border-radius: 50%;
                border: 2px solid rgba(255,255,255,0.8);
                box-shadow: 0 2px 6px rgba(0,0,0,0.25);
                pointer-events: none;
            }
            .leaflet-marker-icon.leaflet-interactive {
                pointer-events: none !important;
            }
            path.poste-circulo {
                pointer-events: visiblePainted;
            }
        `;
        document.head.appendChild(s);
    }

    geojson.features.forEach(f => {
        const p = f.properties;
        const numLabel = L.divIcon({
            className: '',
            html: `<div class="marker-num-grupo" style="background:${cor(p.colorIdx)}">${p.cluster_id + 1}</div>`,
            iconSize: [26, 26],
            iconAnchor: [13, 13],
        });
        L.marker([p.centroide_lat, p.centroide_lon], { icon: numLabel, interactive: false })
          .addTo(camada);
    });

    if (limitesAtuais === null && camada.getBounds().isValid()) {
        limitesAtuais = camada.getBounds();
        mapa.fitBounds(limitesAtuais, { padding: [60, 60] });
    }

    const k = document.getElementById('k-slider').value;
    document.getElementById('legenda-titulo').textContent = `Grupos (${k})`;
    const lista = document.getElementById('legenda-lista');
    lista.innerHTML = '';
    geojson.features
        .slice()
        .sort((a, b) => a.properties.cluster_id - b.properties.cluster_id)
        .forEach(f => {
            const p = f.properties;
            const item = document.createElement('div');
            item.className = 'legenda-item';
            item.innerHTML = `
                <div class="legenda-cor" style="background:${cor(p.colorIdx)}"></div>
                <span class="legenda-nome">Grupo ${p.cluster_id + 1}</span>
                <span class="legenda-count">${p.total_postes} postes</span>
            `;
            lista.appendChild(item);
        });
    document.getElementById('legenda').style.display = 'block';
}

async function carregarPostes(clusterId) {
    if (camadaPostes) { mapa.removeLayer(camadaPostes); camadaPostes = null; }
    try {
        const resp = await fetch(`${API_BASE}/api/postes/${clusterId}?k=${kAtual}`);
        if (!resp.ok) throw new Error('Erro ao buscar postes.');
        const geojson = await resp.json();
        camadaPostes = L.geoJSON(geojson, {
            pointToLayer: (feature, latlng) => {
                const sit = feature.properties.situacao;
                const c   = sit === 'normal' ? '#43a047' : '#e53935';
                return L.circleMarker(latlng, {
                    radius: 4, fillColor: c, color: '#fff',
                    weight: 1, fillOpacity: 0.9,
                    bubblingMouseEvents: true,
                    className: 'poste-circulo',
                });
            },
            onEachFeature: (feature, layer) => {
                const { situacao, bairro, validade } = feature.properties;
                const sitClass = situacao === 'normal' ? 'sit-normal' : 'sit-problema';
                const validadeStr = validade
                    ? `<br><span style="color:#78909c;font-size:13px">Validade: <b>${validade}</b></span>`
                    : '';
                layer.bindTooltip(
                    `<b>Poste</b><br>${bairro}<br>` +
                    `Situação: <span class="${sitClass}">${situacao}</span>` +
                    validadeStr,
                    { sticky: true, className: 'tooltip-poste', direction: 'top' }
                );
                if (situacao !== 'normal') {
                    layer.on('click', function () {
                        const coords = feature.geometry.coordinates;
                        mapa.setView([coords[1], coords[0]], 19, { animate: true });
                    });
                }
            }
        }).addTo(mapa);
        mostrarStatus(`${geojson.features.length} postes no grupo ${clusterId + 1}`, 3000);
    } catch (err) {
        console.error(err);
    }
}

async function buscar() {
    const input = document.getElementById('inputCidade').value.trim();
    if (!input || !mapa) return;
    const k = document.getElementById('k-slider').value;
    kAtual = parseInt(k);
    mostrarLoading(true, 'GEOCODIFICANDO...');
    document.getElementById('legenda').style.display = 'none';
    if (camadaPostes) { mapa.removeLayer(camadaPostes); camadaPostes = null; }
    clusterAtivo = null;
    limitesAtuais = null;

    try {
        const geoResp = await fetch(`${API_BASE}/api/geocode?cidade=${encodeURIComponent(input)}`);
        if (!geoResp.ok) throw new Error('Cidade não encontrada.');
        const { lat, lon } = await geoResp.json();
        mapa.setView([lat, lon], 13);

        mostrarLoading(true, `AGRUPANDO  K = ${k}...`);
        const cResp = await fetch(`${API_BASE}/api/clusters?k=${k}`);
        if (!cResp.ok) throw new Error('Erro ao buscar grupos.');
        const geojson = await cResp.json();
        if (!geojson.features.length) { mostrarStatus('Nenhum grupo gerado.', 5000); return; }
        renderizarGrupos(geojson);
        mostrarStatus(`${geojson.features.length} grupos carregados`, 4000);
    } catch (err) {
        mostrarStatus(`Erro: ${err.message}`, 5000);
        console.error(err);
    } finally {
        mostrarLoading(false);
    }
}

async function atualizarGrupos() {
    if (!mapa) return;
    const k = document.getElementById('k-slider').value;
    kAtual = parseInt(k);
    if (camadaPostes) { mapa.removeLayer(camadaPostes); camadaPostes = null; }
    clusterAtivo = null;

    try {
        mostrarLoading(true, `AGRUPANDO  K = ${k}...`);
        const cResp = await fetch(`${API_BASE}/api/clusters?k=${k}`);
        if (!cResp.ok) throw new Error('Erro ao buscar grupos.');
        const geojson = await cResp.json();
        if (!geojson.features.length) { mostrarStatus('Nenhum grupo gerado.', 5000); return; }

        const bounds = mapa.getBounds();
        const zoom   = mapa.getZoom();
        renderizarGrupos(geojson);
        mapa.fitBounds(bounds, { animate: false });
        mapa.setZoom(zoom, { animate: false });

        mostrarStatus(`${geojson.features.length} grupos carregados`, 3000);
    } catch (err) {
        mostrarStatus(`Erro: ${err.message}`, 5000);
        console.error(err);
    } finally {
        mostrarLoading(false);
    }
}

async function carregarResumo() {
    try {
        const [respResumo, respVencidas] = await Promise.all([
            fetch(`${API_BASE}/api/resumo`),
            fetch(`${API_BASE}/api/luminarias-vencidas`)
        ]);
        if (!respResumo.ok) return;
        const { total, com_problema } = await respResumo.json();
        const ok = total - com_problema;
        document.getElementById('res-total').textContent    = total.toLocaleString('pt-BR');
        document.getElementById('res-ok').textContent       = ok.toLocaleString('pt-BR');
        document.getElementById('res-problema').textContent = com_problema.toLocaleString('pt-BR');

        if (respVencidas.ok) {
            const vencidas = await respVencidas.json();
            document.getElementById('res-vencidas').textContent = vencidas.length.toLocaleString('pt-BR');
        }

        document.getElementById('card-resumo').style.display = 'block';
        document.getElementById('btn-vencidas-wrapper').style.display = 'block';
    } catch (err) {
        console.error(err);
    }
}

async function abrirModalVencidas() {
    document.getElementById('modal-vencidas').classList.add('aberto');
    const body = document.getElementById('modal-body-content');
    body.innerHTML = '<p class="modal-vazia">Carregando...</p>';
    try {
        const resp = await fetch(`${API_BASE}/api/luminarias-vencidas`);
        if (!resp.ok) throw new Error('Erro ao buscar dados.');
        const lista = await resp.json();
        if (!lista.length) {
            body.innerHTML = '<p class="modal-vazia">Nenhuma luminária vencida encontrada.</p>';
            return;
        }
        let html = `<table>
            <thead><tr><th>Bairro</th><th>Data de Validade</th></tr></thead>
            <tbody>`;
        lista.forEach(item => {
            html += `<tr>
                <td class="bairro">${item.bairro}</td>
                <td class="vencida">${item.validade}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        body.innerHTML = html;
    } catch (err) {
        body.innerHTML = `<p class="modal-vazia" style="color:#e53935">Erro ao carregar dados.</p>`;
    }
}

function fecharModalVencidas() {
    document.getElementById('modal-vencidas').classList.remove('aberto');
}

document.addEventListener('click', e => {
    const modal = document.getElementById('modal-vencidas');
    if (e.target === modal) fecharModalVencidas();
});
</script>
