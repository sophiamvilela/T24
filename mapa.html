<!DOCTYPE html>
<html>

<head>
    <title>LumiGuard - Mapa</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    // arrumei p ocupar a página toda
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        #mapa {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>

<div id="mapa"></div>

<script>
    // criando o mapa e centralizando em srs
    var mapa = L.map('mapa').setView([-22.2519, -45.7045], 14);

    // buscando as imagens do openstreetmap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
</script>

</body>
</html>
